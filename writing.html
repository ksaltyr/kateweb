<!DOCTYPE html>
<html>

<head>

<title>Writing</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
padding:0;
font-family: Verdana, Geneva, sans-serif;
background-image:url("fish2.jpg");
background-repeat:repeat;
background-size:120px;
}

.page{
max-width:720px;
margin:40px auto;
padding:0 20px;
}

.box{
background:white;
border:2px solid black;
padding:18px;
margin-bottom:18px;
}

.header{
display:flex;
align-items:center;
gap:14px;
}

.header img{
width:40px;
image-rendering:pixelated;
}

h1{
margin:0;
font-size:26px;
font-weight:normal;
}

.post-title{
font-size:18px;
margin-bottom:6px;
}

.date{
font-size:12px;
color:#555;
margin-bottom:10px;
}

p{
line-height:1.6;
}

a{
color:black;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}
  
.post-image{
width:300px;
margin-top:12px;
border:2px solid black;
}
  
</style>

</head>

<body>

<div class="page">

<div class="box header">

<img src="favicon.gif">

<h1>Writing</h1>

</div>


<div class="box">

<div class="post-title">A few thoughts about banana splits</div>

<div class="date">March 8 2026</div>

<p>
Hello. Do you ever get the feeling like things are moving too quickly? I heard that happens as you get older. 
</p>
  
<img src="bananasplit.png" class="post-image">
  
</div>


<div class="box">

<div class="post-title">Another Note</div>

<div class="date">March 2026</div>

<p>
Sometimes the internet feels too big. I like having a small page like this.
</p>

</div>


<div class="box">

<a href="index.html">← Back Home</a>

</div>

</div>

</body>

</html>
