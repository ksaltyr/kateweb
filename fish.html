width:40px;

}

}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;

}

.art-piece img{
width:100%;
border:2px solid black;

}

.art-piece img:hover{
opacity:0.9;
}

.caption{
font-size:12px;
margin-top:6px;
}

a{
color:black;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

@media (max-width:700px){
.gallery{
grid-template-columns:1fr;
}
}
