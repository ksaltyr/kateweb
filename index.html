<!DOCTYPE html>
<html>

<head>

<title>KATE</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
padding:0;
font-family: Verdana, Geneva, sans-serif;
background-image:url("fish2.jpg");
background-repeat:repeat;
background-size:120px;
}

.page{
max-width:720px;
margin:40px auto;
padding:0 20px;
}

.box{
background:white;
border:2px solid black;
padding:18px;
margin-bottom:18px;
}

.header{
display:flex;
align-items:center;
gap:14px;
}

.header img{
width:40px;
image-rendering:pixelated;
}

h1{
margin:0;
font-size:28px;
font-weight:normal;
}

.subtitle{
margin-top:4px;
}

.menu{
cursor:pointer;
transition:background .15s;
}

.menu:hover{
background:#f2f2f2;
}

.menu a{
display:block;
text-decoration:none;
color:black;
font-size:20px;
}
  
.menu a{
display:flex;
align-items:center;
gap:10px;
font-size:18px;
text-decoration:none;
color:black;
}

.menu-icon{
width:44px;
image-rendering:pixelated;
}
 #fish{
position:fixed;
bottom:80px;
left:-80px;
width:40px;
image-rendering:pixelated;
animation: swim 35s linear infinite;
z-index:999;
}

@keyframes swim{
0%{
left:-80px;
}
100%{
left:110vw;
}
}

#feedFish{
position:fixed;
top:20px;
right:20px;
background:white;
border:2px solid black;
padding:6px 10px;
font-family:Verdana, Geneva, sans-serif;
cursor:pointer;
z-index:1000;
}

.food{
position:fixed;
width:10px;
height:10px;
background:#6b4f2a;
border:1px solid black;
border-radius:50%;
z-index:998;
}
  
</style>

</head>

<body>

<div class="page">

<div class="box header">

<img src="favicon.gif">

<div>
<h1>KATE</h1>
<div class="subtitle">a Web page</div>
</div>

</div>

<div class="box menu">
<a href="hello.html"><img src="FISHH.gif" class="menu-icon">HELLO</a>
</div>

<div class="box menu">
<a href="writing.html"><img src="FISHH.gif" class="menu-icon">WORDS</a>
</div>

<div class="box menu">
<a href="photos.html"><img src="FISHH.gif" class="menu-icon">PHOTOS</a>
</div>

<div class="box menu">
<a href="links.html"><img src="FISHH.gif" class="menu-icon">LINKS</a>
</div>

</div>

<img src="FISHH.gif" id="fish">

<button id="feedFish">Feed Fish</button>
  
<script>

const fish = document.getElementById("fish");
const button = document.getElementById("feedFish");

button.addEventListener("click", () => {

const food = document.createElement("div");
food.className = "food";

const x = Math.random() * (window.innerWidth - 100);
const y = Math.random() * (window.innerHeight - 200) + 100;

food.style.left = x + "px";
food.style.top = y + "px";

document.body.appendChild(food);

/* pause normal swim */
fish.style.animation = "none";

/* move fish to food */
fish.style.transition = "left 2.5s linear, top 2.5s linear";
fish.style.left = x + "px";
fish.style.top = y + "px";

/* remove food */
setTimeout(() => {
food.remove();
}, 2500);

/* resume swimming */
setTimeout(() => {
fish.style.transition = "";
fish.style.left = "-80px";
fish.style.animation = "swim 35s linear infinite";
}, 2600);

});

</script>  
</body>
</html>
