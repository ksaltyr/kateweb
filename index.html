<!DOCTYPE html>
<html>

<head>
<link rel="icon" type="image" href="favicon.gif">
<title>KATE</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
padding:0;
font-family: Verdana, Geneva, sans-serif;
background-image:url("fish2.jpg");
background-repeat:repeat;
background-size:120px;
}

.page{
max-width:720px;
margin:40px auto;
padding:0 20px;
}

.box{
background:white;
border:2px solid black;
padding:18px;
margin-bottom:18px;
}

.header{
display:flex;
align-items:center;
gap:14px;
}

.header img{
width:40px;
image-rendering:pixelated;
}

h1{
margin:0;
font-size:28px;
font-weight:normal;
}

.subtitle{
margin-top:4px;
}

.menu{
cursor:pointer;
transition:background .15s;
}

.menu:hover{
background:#f2f2f2;
}

.menu a{
display:block;
text-decoration:none;
color:black;
font-size:20px;
}
  
.menu a{
display:flex;
align-items:center;
gap:10px;
font-size:18px;
text-decoration:none;
color:black;
}

.menu-icon{
width:44px;
image-rendering:pixelated;
}

</head>

<body>

<div class="page">

<div class="box header">

<img src="favicon.gif">

<div>
<h1>KATE</h1>
<div class="subtitle">a Web page</div>
</div>

</div>

<div class="box menu">
<a href="hello.html"><img src="FISHH.gif" class="menu-icon">HELLO</a>
</div>

<div class="box menu">
<a href="writing.html"><img src="FISHH.gif" class="menu-icon">WORDS</a>
</div>

<div class="box menu">
<a href="photos.html"><img src="FISHH.gif" class="menu-icon">PHOTOS</a>
</div>

<div class="box menu">
<a href="links.html"><img src="FISHH.gif" class="menu-icon">LINKS</a>
</div>

</div>
<img src="FISHH.gif" id="fish">

<style>
body{
overflow-x:hidden;
}

#fish{
position:fixed;
left:-80px;
top:80vh;
width:40px;
image-rendering:pixelated;
z-index:999;
pointer-events:none;
}

.food{
position:fixed;
width:8px;
height:8px;
background:#7a5a2b;
border:1px solid black;
border-radius:50%;
z-index:998;
pointer-events:none;
}

@keyframes nibble {
0%   { transform: translateY(0px); }
25%  { transform: translateY(3px); }
50%  { transform: translateY(0px); }
75%  { transform: translateY(3px); }
100% { transform: translateY(0px); }
}
</style>

<script>
const fish = document.getElementById("fish");
const foods = [];

let fishX = -80;
let fishY = window.innerHeight * 0.8;
let fishSpeed = 1.2;
let fishState = "swimming"; // swimming | chasing | eating
let targetFood = null;

function updateFishPosition() {
  fish.style.left = fishX + "px";
  fish.style.top = fishY + "px";
}

updateFishPosition();

document.addEventListener("click", function(e){
  for(let i = 0; i < 4; i++){
    createFood(
      e.clientX + (Math.random() * 20 - 10),
      e.clientY + (Math.random() * 10 - 5)
    );
  }
});

function createFood(x, y){
  const food = document.createElement("div");
  food.className = "food";
  food.style.left = x + "px";
  food.style.top = y + "px";
  document.body.appendChild(food);

  foods.push({
    el: food,
    x: x,
    y: y,
    speed: 1 + Math.random() * 1.5,
    settled: false,
    eaten: false
  });
}

function animateFood(){
  const floorY = window.innerHeight - 88;

  for(let i = foods.length - 1; i >= 0; i--){
    const food = foods[i];
    if(food.eaten) continue;

    if(!food.settled){
      food.y += food.speed;

      if(food.y >= floorY){
        food.y = floorY;
        food.settled = true;
      }

      food.el.style.left = food.x + "px";
      food.el.style.top = food.y + "px";
    }
  }

  requestAnimationFrame(animateFood);
}

function distance(ax, ay, bx, by){
  return Math.hypot(ax - bx, ay - by);
}

function findNearestFood(){
  let nearest = null;
  let nearestDist = Infinity;

  for(const food of foods){
    if(food.eaten) continue;

    const d = distance(fishX, fishY, food.x, food.y);
    if(d < nearestDist){
      nearestDist = d;
      nearest = food;
    }
  }

  if(nearest && nearestDist < 250){
    return nearest;
  }

  return null;
}

function moveFish(){
  if(fishState === "swimming"){
    fishX += fishSpeed;

    if(fishX > window.innerWidth + 60){
      fishX = -80;
      fishY = window.innerHeight * (0.7 + Math.random() * 0.15);
    }

    const nearbyFood = findNearestFood();
    if(nearbyFood){
      fishState = "chasing";
      targetFood = nearbyFood;
    }
  }

  else if(fishState === "chasing"){
    if(!targetFood || targetFood.eaten){
      fishState = "swimming";
      targetFood = null;
      return;
    }

    const dx = targetFood.x - fishX;
    const dy = targetFood.y - fishY;
    const d = Math.hypot(dx, dy);

    if(d < 8){
      fishState = "eating";
      fish.style.animation = "nibble 0.4s linear 3";
      setTimeout(() => {
        if(targetFood && !targetFood.eaten){
          targetFood.eaten = true;
          targetFood.el.remove();
          const index = foods.indexOf(targetFood);
          if(index > -1) foods.splice(index, 1);
        }
        fish.style.animation = "";
        fishState = "swimming";
        targetFood = null;
      }, 1200);
    } else {
      fishX += dx / d * 2;
      fishY += dy / d * 2;
    }
  }

  updateFishPosition();
  requestAnimationFrame(moveFish);
}

animateFood();
moveFish();
</script>
</body>
</html>
