<!DOCTYPE html>
<html>

<head>

<title>KATE</title>
  
<link rel="icon" type="image" href="favicon.gif">
  
<link rel="shortcut icon" type="image" href="favicon.gif">
  
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
padding:0;
font-family: Verdana, Geneva, sans-serif;
background-image:url("fish2.jpg");
background-repeat:repeat;
background-size:120px;
}

.page{
max-width:720px;
margin:40px auto;
padding:0 20px;
}

.box{
background:white;
border:2px solid black;
padding:18px;
margin-bottom:18px;
}

.header{
display:flex;
align-items:center;
gap:14px;
}

.header img{
width:40px;
image-rendering:pixelated;
}

h1{
margin:0;
font-size:28px;
font-weight:normal;
}

.subtitle{
margin-top:4px;
}

.menu{
cursor:pointer;
transition:background .15s;
}

.menu:hover{
background:#f2f2f2;
}

.menu a{
display:block;
text-decoration:none;
color:black;
font-size:20px;
}
  
.menu a{
display:flex;
align-items:center;
gap:10px;
font-size:18px;
text-decoration:none;
color:black;
}

.menu-icon{
width:44px;
image-rendering:pixelated;
}
 
body{
overflow-x:hidden;
}

#fish{
position:fixed;
top:80vh;
width:80px;
image-rendering:pixelated;
z-index:998;
pointer-events:none;
}

.facing-left{
transform:scaleX(-1);
}

.facing-right{
transform:scaleX(1);
}

.food{
position:fixed;
width:8px;
height:8px;
background:#7a5a2b;
border:1px solid black;
border-radius:50%;
z-index:999;
pointer-events:none;
}

</style>

</head>

<body>

<div class="page">

<div class="box header">

<img src="favicon.gif">

<div>
<h1>KATE</h1>
<div class="subtitle">a Web page</div>
</div>

</div>

<div class="box menu">
<a href="hello.html"><img src="FISHH.gif" class="menu-icon">HELLO</a>
</div>

<div class="box menu">
<a href="writing.html"><img src="FISHH.gif" class="menu-icon">WORDS</a>
</div>

<div class="box menu">
<a href="photos.html"><img src="FISHH.gif" class="menu-icon">PHOTOS</a>
</div>

<div class="box menu">
<a href="links.html"><img src="FISHH.gif" class="menu-icon">LINKS</a>
</div>
<button id="feedFish">Feed Fish</button>
</div>
<img src="clownfish.gif" id="fish" class="facing-left">

<script>

const fish = document.getElementById("fish");
const foods = [];

let fishX = window.innerWidth + 80;
let fishY = window.innerHeight * 0.8;
let fishSpeed = 1.2;

function setDirection(dir){
fish.classList.remove("facing-left","facing-right");
fish.classList.add(dir);
}

function updateFish(){
fish.style.left = fishX + "px";
fish.style.top = fishY + "px";
}

setDirection("facing-left");

document.addEventListener("click", function(e){

for(let i=0;i<4;i++){
createFood(e.clientX, e.clientY + i*6);
}

});

function createFood(x,y){

const food=document.createElement("div");
food.className="food";

food.style.left=(x-4)+"px";
food.style.top=(y-4)+"px";

document.body.appendChild(food);

foods.push({
el:food,
x:x,
y:y,
speed:1.2,
settled:false
});

}

function animateFood(){

const floor=window.innerHeight-88;

for(const food of foods){

if(!food.settled){

food.y+=food.speed;

if(food.y>=floor){
food.y=floor;
food.settled=true;
}

food.el.style.top=food.y+"px";

}

}

requestAnimationFrame(animateFood);

}

function swim(){

fishX -= fishSpeed;

if(fishX < -120){

fishX = window.innerWidth + 80;
fishY = window.innerHeight * (0.7 + Math.random()*0.2);

}

updateFish();
requestAnimationFrame(swim);

}

animateFood();
swim();

</script>  
</body>
</html>
