<!DOCTYPE html>
<html>

<head>

<title>Kate</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
padding:0;
font-family: Verdana, Geneva, sans-serif;
background-image:url("fish2.jpg");
background-repeat:repeat;
background-size:120px;
}

.page{
max-width:720px;
margin:40px auto;
padding:0 20px;
}

.box{
background:white;
border:2px solid black;
padding:18px;
margin-bottom:18px;
}

.header{
display:flex;
align-items:center;
gap:14px;
}

.header img{
width:40px;
image-rendering:pixelated;
}

h1{
margin:0;
font-size:28px;
font-weight:normal;
}

.subtitle{
margin-top:4px;
}

.menu{
cursor:pointer;
transition:background .15s;
}

.menu:hover{
background:#f2f2f2;
}

.menu a{
display:block;
text-decoration:none;
color:black;
font-size:20px;
}

.fish{
position:fixed;
bottom:40px;
left:-80px;
width:40px;
image-rendering:pixelated;
pointer-events:none;
animation:swim 30s linear infinite;
}

@keyframes swim{
0%{left:-80px;}
100%{left:110%;}
}

</style>

</head>

<body>

<div class="page">

<div class="box header">

<img src="favicon.gif">

<div>
<h1>Kate</h1>
<div class="subtitle">a Web page</div>
</div>

</div>


<div class="box menu">
<a href="hello.html">Hello</a>
</div>

<div class="box menu">
<a href="222.html">222</a>
</div>

<div class="box menu">
<a href="333.html">333</a>
</div>

<div class="box menu">
<a href="links.html">Links</a>
</div>

</div>

<img src="fish.gif" class="fish">

</body>
</html>
