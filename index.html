<!DOCTYPE html>
<html>

<head>

<title>Kate</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
padding:0;
font-family: Verdana, Geneva, sans-serif;
background-image:url("background.gif");
background-repeat:repeat;
background-size:auto;
}

.page{
max-width:720px;
margin:40px auto;
padding:0 20px;
}

.box{
background:white;
border:2px solid black;
padding:18px;
margin-bottom:18px;
}

h1{
margin:0 0 10px 0;
font-size:28px;
font-weight:normal;
}

h2{
margin-top:0;
font-size:18px;
font-weight:normal;
}

.nav a{
margin-right:14px;
color:black;
text-decoration:none;
}

.nav a:hover{
text-decoration:underline;
}

p{
line-height:1.6;
}

.fish{
position:fixed;
bottom:40px;
left:-80px;
width:40px;
image-rendering:pixelated;
pointer-events:none;
animation:swim 30s linear infinite;
}

@keyframes swim{
0%{left:-80px;}
100%{left:110%;}
}

</style>

</head>

<body>

<div class="page">

<div class="box">
<h1>Kate</h1>
<p>a small place on the internet</p>
</div>

<div class="box nav">
<a href="#about">about</a>
<a href="#writing">writing</a>
<a href="#photos">photos</a>
<a href="#links">links</a>
</div>

<div class="box" id="about">
<h2>About</h2>
<p>Hi, I'm Kate. This is my website.</p>
</div>

<div class="box" id="writing">
<h2>Writing</h2>
<p>I'll put writing here.</p>
</div>

<div class="box" id="photos">
<h2>Photos</h2>
<p>Images and other things.</p>
</div>

<div class="box" id="links">
<h2>Links</h2>
<p>Links to things I like.</p>
</div>

</div>

<img src="fish.gif" class="fish">

</body>

</html>
