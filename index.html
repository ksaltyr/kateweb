<!DOCTYPE html>
<html>

<head>

<title>Kate</title>
  
<link rel="icon" href="favicon.gif">
  
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
padding:0;
font-family: Verdana, Geneva, sans-serif;
background-image:url("background.gif");
background-repeat:repeat;
background-size:200px;
}

.page{
max-width:720px;
margin:40px auto;
padding:0 20px;
}

.box{
background:white;
border:2px solid black;
padding:18px;
margin-bottom:18px;
}

h1{
margin:0 0 10px 0;
font-size:28px;
font-weight:normal;
}

h2{
margin-top:0;
font-size:18px;
font-weight:normal;
}

.nav a{
margin-right:14px;
color:black;
text-decoration:none;
}

.nav a:hover{
text-decoration:underline;
}

p{
line-height:1.6;
}

.fish{
position:fixed;
bottom:40px;
left:-80px;
width:40px;
image-rendering:pixelated;
pointer-events:none;
animation:swim 30s linear infinite;
}

@keyframes swim{
0%{left:-80px;}
100%{left:110%;}
}

</style>

</head>

<body>

<div class="page">

<div class="box">
<h1>Kate</h1>
<p>a Web page</p>
</div>

<div class="box nav">
<a href="#hello">hello</a>
<a href="#222">222</a>
<a href="#333">333</a>
<a href="#444">444</a>
</div>

<div class="box" id="hello">
<h2>Hello</h2>
<p>My name is Kate. I made this online. </p>
</div>

<div class="box" id="222">
<h2>222</h2>
<p>Future Post Here!! Check back soon.</p>
</div>

<div class="box" id="333">
<h2>333</h2>
<p>Future Post Here!! Check back soon.</p>
</div>

<div class="box" id="444">
<h2>444</h2>
<p>Future Post Here!! Check back soon.</p>
</div>

</div>

</body>

</html>
