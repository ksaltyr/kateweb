<!DOCTYPE html>
<html>

<head>

<title>KATE</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
padding:0;
font-family: Verdana, Geneva, sans-serif;
background-image:url("fish2.jpg");
background-repeat:repeat;
background-size:120px;
}

.page{
max-width:720px;
margin:40px auto;
padding:0 20px;
}

.box{
background:white;
border:2px solid black;
padding:18px;
margin-bottom:18px;
}

.header{
display:flex;
align-items:center;
gap:14px;
}

.header img{
width:40px;
image-rendering:pixelated;
}

h1{
margin:0;
font-size:28px;
font-weight:normal;
}

.subtitle{
margin-top:4px;
}

.menu{
cursor:pointer;
transition:background .15s;
}

.menu:hover{
background:#f2f2f2;
}

.menu a{
display:block;
text-decoration:none;
color:black;
font-size:20px;
}

.fish{
position:fixed;
bottom:40px;
left:-80px;
width:40px;
image-rendering:pixelated;
pointer-events:none;

}

@keyframes swim{
0%{left:-80px;}
100%{left:110%;}
}
  
.menu a{
display:flex;
align-items:center;
gap:10px;
font-size:18px;
text-decoration:none;
color:black;
}

.menu-icon{
width:44px;
image-rendering:pixelated;
}
  #feed-button{
position:fixed;
top:20px;
right:20px;
z-index:1000;
background:white;
border:2px solid black;
padding:8px 12px;
font-family: Verdana, Geneva, sans-serif;
font-size:14px;
cursor:pointer;
}

#food-area{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:999;
}

.food{
position:fixed;
width:8px;
height:8px;
background:black;
border-radius:50%;
pointer-events:none;
}

.fish{
position:fixed;
bottom:40px;
left:-80px;
width:40px;
image-rendering:pixelated;
pointer-events:none;
z-index:998;
}
  
</style>

</head>

<body>

<div class="page">

<div class="box header">

<img src="favicon.gif">

<div>
<h1>KATE</h1>
<div class="subtitle">a Web page</div>
</div>

</div>

<div class="box menu">
<a href="hello.html"><img src="FISHH.gif" class="menu-icon">HELLO</a>
</div>

<div class="box menu">
<a href="writing.html"><img src="FISHH.gif" class="menu-icon">WORDS</a>
</div>

<div class="box menu">
<a href="photos.html"><img src="FISHH.gif" class="menu-icon">PHOTOS</a>
</div>

<div class="box menu">
<a href="links.html"><img src="FISHH.gif" class="menu-icon">LINKS</a>
</div>

</div>

<img src="FISHH.gif" class="fish">
<button id="feed-button">Feed Fish</button>
<div id="food-area"></div>
<img src="FISHH.gif" class="fish" id="fish">
  <script>
const fish = document.getElementById("fish");
const button = document.getElementById("feed-button");
const foodArea = document.getElementById("food-area");

let fishX = -80;
let fishY = window.innerHeight - 100;

fish.style.left = fishX + "px";
fish.style.top = fishY + "px";

button.addEventListener("click", () => {
  const food = document.createElement("div");
  food.className = "food";

  const targetX = Math.random() * (window.innerWidth - 60) + 20;
  const targetY = Math.random() * (window.innerHeight - 200) + 100;

  food.style.left = targetX + "px";
  food.style.top = targetY + "px";

  foodArea.appendChild(food);

  moveFishTo(targetX, targetY);

  setTimeout(() => {
    food.remove();
  }, 4000);
});

function moveFishTo(targetX, targetY){
  fish.style.transition = "left 3s linear, top 3s linear";
  fish.style.left = targetX + "px";
  fish.style.top = targetY + "px";
}
</script>
  
</body>
</html>
