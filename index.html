<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kate</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
  margin: 0;
  font-family: "Libre Baskerville", serif;
  font-weight: 400;
    }
      color: #000;
      background-image: url("5388874_f64de.gif");
      background-repeat: repeat;
      background-size: auto;
      background-attachment: fixed;
      background-position: center;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(255, 255, 255, 0.15);
      padding: 40px 20px 80px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .header-box,
    .nav-box,
    .section-box {
      background: white;
      border: 2px solid black;
      padding: 18px 20px;
      margin-bottom: 18px;
      box-shadow: 6px 6px 0 #000;
    }

    h1 {
  margin: 0 0 8px 0;
  font-size: 2.4rem;
  font-weight: 400;
    }

    .tagline {
      margin: 0;
      font-size: 1rem;
    }

    .nav-box a {
      color: black;
      text-decoration: none;
      margin-right: 14px;
      font-weight: bold;
    }

    .nav-box a:hover {
      text-decoration: underline;
    }

    h2 {
  margin-top: 0;
  font-size: 1.3rem;
  font-weight: 500;
    }

    p {
      line-height: 1.6;
      margin-bottom: 0;
    }

    .section-box + .section-box {
      margin-top: 24px;
    }

    @media (max-width: 600px) {
      body {
        background-attachment: scroll;
      }

      h1 {
        font-size: 2rem;
      }

      .header-box,
      .nav-box,
      .section-box {
        padding: 16px;
        box-shadow: 4px 4px 0 #000;
      }

      .nav-box a {
        display: inline-block;
        margin-bottom: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="container">

      <div class="header-box">
        <h1>Kate</h1>
        <p class="tagline">website</p>
      </div>

      <div class="nav-box">
        <a href="#about">about</a>
        <a href="#writing">writing</a>
        <a href="#photos">photos</a>
        <a href="#links">links</a>
      </div>

      <div class="section-box" id="about">
        <h2>About</h2>
        <p>
          My name is Kate. This is my website. 
        </p>
      </div>

      <div class="section-box" id="writing">
        <h2>Writing</h2>
        <p>
          1111111
        </p>
      </div>

      <div class="section-box" id="photos">
        <h2>Photos</h2>
        <p>
          22222
        </p>
      </div>

      <div class="section-box" id="links">
        <h2>Links</h2>
        <p>
          333
        </p>
      </div>

    </div>
  </div>
</body>
</html>
