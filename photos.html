<!DOCTYPE html>
<html>

<head>

<title>Photographs..</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
padding:0;
font-family: Verdana, Geneva, sans-serif;
background-image:url("fish2.jpg");
background-repeat:repeat;
background-size:120px;
}

.page{
max-width:720px;
margin:40px auto;
padding:0 20px;
}

.box{
background:white;
border:2px solid black;
padding:18px;
margin-bottom:18px;
}

.header{
display:flex;
align-items:center;
gap:14px;
}

.header img{
width:40px;
image-rendering:pixelated;
}

h1{
margin:0;
font-size:26px;
font-weight:normal;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.photo-link{
background:white;
border:2px solid black;
padding:20px;
text-align:center;
text-decoration:none;
color:black;
display:block;
}

.photo-link:hover{
background:#f2f2f2;
}

.photo-link img{
width:48px;
display:block;
margin:0 auto 12px auto;
image-rendering:pixelated;
}

.label{
font-size:18px;
}

a{
color:black;
text-decoration:underline;
}

a:hover{
text-decoration:underline;
}

@media (max-width:700px){
.grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="page">

<div class="box header">
<img src="favicon.gif">
<h1>Photographs.. </h1>
</div>

<div class="grid">

<a href="art.html" class="photo-link">
<img src="FISHH.gif">
<div class="label">My Art</div>
</a>

<a href="fish.html" class="photo-link">
<img src="FISHH.gif">
<div class="label">Fish</div>
</a>

<a href="screenshots.html" class="photo-link">
<img src="FISHH.gif">
<div class="label">Screenshots</div>
</a>

<a href="other-photos.html" class="photo-link">
<img src="FISHH.gif">
<div class="label">Other</div>
</a>

</div>

<div class="box">
<a href="index.html">← Back Home</a>
</div>

</div>

</body>
</html>
