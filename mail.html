<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEND MAIL</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 20px;
      line-height: 1.5;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 25px;
      color: #444;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    label {
      font-weight: bold;
      margin-bottom: 4px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 6px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    button {
      width: fit-content;
      padding: 10px 18px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .note {
      font-size: 14px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>SEND MAIL!</h1>
  <p>Send me a message..</p>

  <form action="https://formspree.io/f/meerlalz" method="POST">
    <label for="name">KATE MAIL</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email">

    <label for="message">Message</label>
    <textarea id="message" name="message" required></textarea>

    <!-- optional subject line in your email -->
    <input type="hidden" name="_subject" value="New mail from kateweb.site">

    <button type="submit">Send</button>
  </form>

  <p class="note">Thanks for visiting kateweb.site.</p>
</body>
</html>
